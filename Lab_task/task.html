<!DOCTYPE html>
<html>

<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>

    <fieldset>
        <legend>Student Registration</legend>

        <form id="studentForm" onsubmit="return registration();">

            <table>

                <tr>
                    <td>First Name <span class="required">*</span></td>
                    <td><input type="text" id="fname"></td>
                    <td><p id="fnameError"></p></td>
                </tr>

                <tr>
                    <td>Last Name <span class="required">*</span></td>
                    <td><input type="text" id="lname"></td>
                    <td><p id="lnameError"></p></td>
                </tr>

                <tr>
                    <td>Student ID <span class="required">*</span></td>
                    <td><input type="text" id="sid"></td>
                    <td><p id="sidError"></p></td>
                </tr>

                <tr>
                    <td>Email <span class="required">*</span></td>
                    <td><input type="text" id="email"></td>
                    <td><p id="emailError"></p></td>
                </tr>

                <tr>
                    <td>Credit Completed <span class="required">*</span></td>
                    <td><input type="number" id="credit"></td>
                    <td><p id="creditError"></p></td>
                </tr>

                <tr>
                    <td>Department <span class="required">*</span></td>
                    <td>
                        <select id="department">
                            <option value="">Select Department</option>
                            <option>CSE</option>
                            <option>CS</option>
                            <option>EEE</option>
                            <option>BBA</option>
                            <option>ENG</option>
                        </select>
                    </td>
                    <td><p id="deptError"></p></td>
                </tr>

                <tr>
                    <td></td>
                    <td align="center">
                        <button type="submit">Submit</button>
                    </td>
                </tr>

            </table>

        </form>

        <p>
            Total Registration:
            <span id="totalRegistrations">0</span>
        </p>

    </fieldset>

    <br>

    <table border="1" id="studentTable">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Credit</th>
            <th>Department</th>
        </tr>
    </table>

</body>

</html>
